name: release

# Publishes to PyPI (org secret PYPI_API_TOKEN) + the MCP Registry (GitHub OIDC).
# Trigger: push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # manual re-run of the MCP Registry publish without bumping the package version

permissions:
  contents: read
  id-token: write   # required for the MCP Registry OIDC login

jobs:
  build-and-publish-pypi:
    if: github.event_name == 'push'   # only on a version tag; skipped on manual dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI (org API token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  build-and-upload-caselaw-index:
    # Ships a pre-built Corte Costituzionale index as a release asset so a fresh install
    # gets the fast lazy-download path instead of building from the open data locally.
    # Independent of the PyPI job: if the Court's open data is unreachable, the package
    # still publishes and clients fall back to the local build.
    if: github.event_name == 'push'   # only on a version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release / upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the package
        run: python -m pip install .

      - name: Build the case-law index from the Court's open data
        run: italy-eli-mcp-caselaw-ingest --db cost.sqlite --quiet

      - name: Compress + checksum
        run: |
          gzip -9 -k cost.sqlite
          sha256sum cost.sqlite.gz > cost.sqlite.gz.sha256
          ls -lh cost.sqlite cost.sqlite.gz

      - name: Attach the index to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" --title "$TAG" --generate-notes \
            cost.sqlite.gz cost.sqlite.gz.sha256 \
          || gh release upload "$TAG" cost.sqlite.gz cost.sqlite.gz.sha256 --clobber

  publish-mcp-registry:
    needs: build-and-publish-pypi
    # run after a successful PyPI publish, OR standalone on manual dispatch
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-and-publish-pypi.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC login to the MCP Registry
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish server.json to MCP Registry
        run: mcp-publisher publish
